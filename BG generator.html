<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BG generator</title>
    <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to right, rgb(29, 145, 229), rgb(152, 63, 198));
      color: white;
       transition: background 0.5s ease;
    }

    section {
      background: rgba(0, 0, 0, 0.4);
      padding: 2rem;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 8px 15px rgba(0,0,0,0.3);
    }

    /* Buttons styling */
    button {
      width: 120px;
      height: 50px;
      border-radius: 12px;
      border: none;
      margin: 0.5rem;
      cursor: pointer;
      outline: none;
      transition: transform 0.2s ease;
    }

    button:hover {
      transform: scale(1.1);
    }

    /* अलग-अलग color buttons */
    #myButton1 {
      background: rgb(29, 145, 229);
    }

    #myButton2 {
      background: rgb(152, 63, 198);
    }

    /* Heading */
    h2 {
      margin-top: 1.5rem;
      font-size: 1.4rem;
    }

    /* Copy code box */
    .copyCode {
      margin-top: 1rem;
      background: #222;
      padding: 1rem;
      border-radius: 8px;
      font-family: monospace;
      font-size: 0.9rem;
      color: #00ffcc;
    }
  </style>
</head>
<body>
    <section>
        <div>
            <button id="myButton1"></button>
            <button id="myButton2"></button>
        </div>
        <h2>copy your code here</h2>
        <div class="copyCode">
     background-image: linear-gradient(to right, rgb(29, 145, 229),rgb(152, 63, 198))
        </div>
    </section>
    <script>
        //get buttons
        let btn1 = document.getElementById('myButton1');
        let btn2 = document.getElementById('myButton2');
        let copyDiv = document.querySelector(".copyCode");
      
        // add function

        const hexValues = () => {
            let myHexValue = "0123456789abcdef";
           let colors = "#";

           for(let i=0; i<6; i++){
            colors = colors+(myHexValue[Math.floor(Math.random()*16)]);
           };
           return colors;
        };
        let rgb1 = "#000000";
        let rgb2 = "#ffffff";
        const handlebutton1 =() => {
           
           rgb1 = hexValues();
          console.log(rgb1); 
          btn1.innerText = rgb1;
          document.body.style.backgroundImage = `linear-gradient(to right, ${rgb1},${rgb2}`;
          copyDiv.innerHTML = `background-image: linear-gradient(to right,  ${rgb1},${rgb2}`;
        }; 
        const handlebutton2 = () => {
             rgb2 = hexValues();
            console.log(rgb2);
            btn2.innerText = rgb2;
            document.body.style.backgroundImage = `linear-gradient(to right,${rgb1},${rgb2})`;
            copyDiv.innerHTML = `background-image: linear-gradient(to right,  ${rgb1},${rgb2}`;
        }
        //add event
        btn1.addEventListener("click", handlebutton1);
        btn2.addEventListener("click",handlebutton2);
        copyDiv.addEventListener('click',()=>{
            navigator.clipboard.writeText(copyDiv.innerText)
        })
    </script>
</body>
</html>
